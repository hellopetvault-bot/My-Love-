<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love! 💖✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #fecfef; /* Solid pink to match your vision */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1000px;
        }

        /* BIG HEADING LIKE YOUR SCREENSHOT */
        .birthday-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 10vw, 6rem); 
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .wish-btn {
            background: #ffeb3b;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            cursor: pointer;
        }

        .content-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .quote-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .quote-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #555;
            line-height: 1.4;
        }

        .photo-frame {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            transform: rotate(2deg);
        }

        .photo-frame img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ff8a80;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="birthday-title">Happy Birthday, Januuu! 🎂</h1>
        
        <button class="wish-btn">🎁 Click for Birthday Wish!</button>

        <div class="content-layout">
            <div class="quote-box">
                <p class="quote-text">Every moment with you feels like a dream I never want to wake up from. ✨</p>
            </div>

            <div class="photo-frame">
                <img src="https://i.ibb.co/Jwv7VqF6/Whats-App-Image-2026-01-22-at-1-34-46-AM.jpg" alt="Our Memory">
            </div>
        </div>
    </div>

    <div class="music-toggle">🎵</div>

</body>
</html>
